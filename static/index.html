<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>客户增长控制台</title>
    <link rel="stylesheet" href="/styles.css?v=2026060505">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>客户增长控制台</h1>
        <p id="clock">正在读取数据</p>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="secondary" title="刷新数据">刷新</button>
        <button id="dailyBtn">每日获客</button>
      </div>
    </header>

    <main>
      <section class="summaryBand" aria-label="客户概览">
        <div>
          <span>客户总数</span>
          <strong id="totalCount">0</strong>
        </div>
        <div>
          <span>已发客户</span>
          <strong id="sentCount">0</strong>
        </div>
        <div>
          <span>未发客户</span>
          <strong id="unsentCount">0</strong>
        </div>
        <div>
          <span>待人工跟进</span>
          <strong id="interventionCount">0</strong>
        </div>
      </section>

      <section class="panel sendPanel">
        <div class="sectionHeader tight">
          <div>
            <h2>邮件发送</h2>
            <p>选择车型、数量和发件邮箱后执行</p>
          </div>
          <span id="taskState">空闲</span>
        </div>
        <div class="controls">
          <label>
            <span>车型</span>
            <select id="modelSelect"></select>
          </label>
          <label>
            <span>发送数量</span>
            <input id="sendLimit" type="number" min="0" max="500" value="10">
          </label>
          <label>
            <span>发件邮箱</span>
            <select id="senderSelect"></select>
          </label>
          <button id="sendBtn">发送邮件</button>
        </div>
      </section>

      <section>
        <div class="sectionHeader">
          <div>
            <h2>类别</h2>
            <p>每个车型独立统计客户、发送状态和今日发送失效</p>
          </div>
        </div>
        <div id="modelGrid" class="modelGrid"></div>
      </section>

      <section class="twoColumn">
        <div>
          <div class="sectionHeader">
            <div>
              <h2>邮箱状态</h2>
              <p>网站启动后自动后台检测，包含垃圾邮件和垃圾箱</p>
            </div>
          </div>
          <div id="mailGrid" class="mailGrid"></div>
        </div>
        <div>
          <div class="sectionHeader">
            <div>
              <h2>待人工跟进</h2>
              <p>客户出现采购意向、询价或合作信号后进入这里</p>
            </div>
            <button id="clearInterventionBtn" class="danger">一键清除</button>
          </div>
          <div id="interventionList" class="list"></div>
        </div>
      </section>
    </main>

    <dialog id="mailModal" class="modalOverlay">
      <div class="modalPanel" aria-labelledby="modalSubject">
        <div class="modalHeader">
          <div>
            <h2 id="modalSubject">邮件内容</h2>
            <p id="modalFrom"></p>
          </div>
          <div class="modalActions">
            <button id="markReadBtn">已读</button>
            <button id="closeModalBtn" class="ghost">关闭</button>
          </div>
        </div>
        <div id="modalBody" class="modalBody"></div>
      </div>
    </dialog>

    <script src="/app.js?v=2026060507"></script>
  </body>
</html>
