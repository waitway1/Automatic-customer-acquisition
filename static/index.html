<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>客户运营台</title>
    <link rel="stylesheet" href="/styles.css?v=2026061201">
  </head>
  <body>
    <header class="topbar">
      <div class="brandBlock">
        <span class="brandMark" aria-hidden="true">C</span>
        <div>
          <h1>客户运营台</h1>
          <p id="clock">同步中</p>
        </div>
      </div>
      <div class="actions">
        <button id="refreshBtn" class="secondary" title="刷新数据">刷新</button>
        <button id="dailyBtn">每日获客</button>
      </div>
    </header>

    <main>
      <section class="summaryBand" aria-label="客户概览">
        <div>
          <span>客户总数</span>
          <strong id="totalCount">0</strong>
        </div>
        <div>
          <span>已发客户</span>
          <strong id="sentCount">0</strong>
        </div>
        <div>
          <span>未发客户</span>
          <strong id="unsentCount">0</strong>
        </div>
        <div>
          <span>待人工跟进</span>
          <strong id="interventionCount">0</strong>
        </div>
      </section>

      <section class="panel sendPanel">
        <div class="sectionHeader tight">
          <div>
            <h2>发送队列</h2>
            <p>车型、数量、发件邮箱</p>
          </div>
          <span id="taskState">空闲</span>
        </div>
        <div class="controls">
          <label>
            <span>车型</span>
            <select id="modelSelect"></select>
          </label>
          <label>
            <span>发送数量</span>
            <input id="sendLimit" type="number" min="0" max="500" value="10">
          </label>
          <label>
            <span>发件邮箱</span>
            <select id="senderSelect"></select>
          </label>
          <button id="sendBtn">发送邮件</button>
        </div>
      </section>

      <section>
        <div class="sectionHeader">
          <div>
            <h2>车型概览</h2>
            <p>客户、已发、未发、今日失效</p>
          </div>
          <button id="syncSheetsBtn" class="secondary">更新表格数据</button>
        </div>
        <div id="modelGrid" class="modelGrid"></div>
      </section>

      <section class="twoColumn">
        <div>
          <div class="sectionHeader">
            <div>
              <h2>邮箱监控</h2>
              <p>新邮件与意向</p>
            </div>
          </div>
          <div id="mailGrid" class="mailGrid"></div>
        </div>
        <div>
          <div class="sectionHeader">
            <div>
              <h2>人工跟进</h2>
              <p>询价、采购意向、合作回复</p>
            </div>
            <button id="clearInterventionBtn" class="danger">一键清除</button>
          </div>
          <div id="interventionList" class="list"></div>
        </div>
      </section>

      <section>
        <div class="sectionHeader">
          <div>
            <h2>退信记录</h2>
            <p>退信车型、邮箱和原因</p>
          </div>
        </div>
        <div id="bounceList" class="bounceList"></div>
      </section>
    </main>

    <dialog id="mailModal" class="modalOverlay">
      <div class="modalPanel" aria-labelledby="modalSubject">
        <div class="modalHeader">
          <div>
            <h2 id="modalSubject">邮件内容</h2>
            <p id="modalFrom"></p>
          </div>
          <div class="modalActions">
            <button id="markReadBtn">已读</button>
            <button id="moveFollowupBtn" class="secondary">移入跟进</button>
            <button id="moveInvalidBtn" class="danger">移入失效邮箱</button>
            <button id="removeBounceBtn" class="secondary">移出退信</button>
            <button id="closeModalBtn" class="iconButton" aria-label="关闭" title="关闭">&times;</button>
          </div>
        </div>
        <div id="modalBody" class="modalBody"></div>
      </div>
    </dialog>

    <script src="/app.js?v=2026061204"></script>
  </body>
</html>
